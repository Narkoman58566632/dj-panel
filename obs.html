<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>StreamDJ OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;font-family:'Unbounded',sans-serif;padding:16px;overflow:hidden;}
:root{--w-bg:rgba(20,0,0,0.85);--w-border:#c0392b;--w-title:#ffffff;--w-from:#7a3535;--w-label:#ff6060;--w-pill:#c08080;--w-fontsize:13px;--w-scroll:12s;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.widget{background:var(--w-bg);border:1px solid var(--w-border);border-radius:12px;padding:10px 16px;min-width:320px;max-width:480px;backdrop-filter:blur(4px);transition:opacity 0.5s ease,transform 0.5s ease;}
.widget.hidden{opacity:0;transform:translateY(8px);pointer-events:none;}
.widget.visible{opacity:1;transform:translateY(0);animation:fadeIn 0.5s ease;}
.top-row{display:flex;align-items:center;gap:10px;overflow:hidden;}
.now-label{font-size:9px;color:var(--w-label);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;animation:pulse 1.5s ease-in-out infinite;}
.track-scroll{flex:1;overflow:hidden;position:relative;}
.track-text{font-size:var(--w-fontsize);color:var(--w-title);white-space:nowrap;display:inline-block;animation:scroll var(--w-scroll) linear infinite;}
.track-text.short{animation:none;}
.from-text{font-size:10px;color:var(--w-from);margin-top:4px;}
.queue-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.q-pill{font-size:10px;color:var(--w-pill);background:#2a0808;border:1px solid #3d1010;border-radius:99px;padding:2px 8px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
.error{color:#ff6060;font-size:12px;font-family:'Unbounded',sans-serif;padding:16px;}
</style>
</head>
<body>

<div class="widget hidden" id="widget">
  <div class="top-row">
    <span class="now-label" id="now-label">&#9835; grає</span>
    <div class="track-scroll"><span class="track-text short" id="track-title"></span></div>
  </div>
  <div class="from-text" id="track-from"></div>
  <div class="queue-row" id="queue-row"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD77vyKpxE-PDJhk4aS8N3_SBAIIwoXIKE",
  authDomain: "livemusicrequests-71c75.firebaseapp.com",
  databaseURL: "https://livemusicrequests-71c75-default-rtdb.firebaseio.com",
  projectId: "livemusicrequests-71c75",
  storageBucket: "livemusicrequests-71c75.firebasestorage.app",
  messagingSenderId: "841403842500",
  appId: "1:841403842500:web:4716afe909ddedec416e91",
  measurementId: "G-70G2MEMNGW"
};

const uid = new URLSearchParams(window.location.search).get('u');
if (!uid) {
  document.body.innerHTML = '<div class="error">❌ No ?u= parameter in URL. Copy the link from DJ panel.</div>';
  throw new Error('no uid');
}

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const queueRef   = ref(db, `users/${uid}/queue`);
const controlRef = ref(db, `users/${uid}/control`);
const themeRef   = ref(db, `users/${uid}/widget_theme`);
const langRef    = ref(db, `users/${uid}/lang`);

// ── i18n ──────────────────────────────────────────────────────────
const STRINGS = {
  uk: {
    playing: '♫ grає',
    from: 'від',
  },
  ru: {
    playing: '♫ играет',
    from: 'от',
  },
  en: {
    playing: '♫ playing',
    from: 'by',
  }
};

let lang = 'uk';
let currentPlaying = null; // cache to re-render on lang change

function S(key) {
  return (STRINGS[lang] || STRINGS.uk)[key];
}

function applyLang() {
  document.getElementById('now-label').textContent = S('playing');
  // Re-render from text if something is playing
  if (currentPlaying) {
    document.getElementById('track-from').textContent = S('from') + ' ' + currentPlaying.from;
  }
}

// Listen for lang changes from panel (saved to Firebase)
onValue(langRef, (snap) => {
  const val = snap.val();
  if (val && STRINGS[val]) {
    lang = val;
    applyLang();
  }
});

// ── THEME ─────────────────────────────────────────────────────────
onValue(themeRef, (snap) => {
  const t = snap.val();
  if (!t) return;
  const s = document.documentElement.style;
  const w = document.getElementById('widget');
  if (t.bg)       { w.style.background = t.bg + 'd9'; }
  if (t.border)   { w.style.borderColor = t.border; s.setProperty('--w-border', t.border); }
  if (t.title)    s.setProperty('--w-title', t.title);
  if (t.from)     s.setProperty('--w-from', t.from);
  if (t.label)    s.setProperty('--w-label', t.label);
  if (t.pill)     s.setProperty('--w-pill', t.pill);
  if (t.fontsize) s.setProperty('--w-fontsize', t.fontsize + 'px');
  if (t.scroll)   s.setProperty('--w-scroll', t.scroll + 's');
});

// ── PLAYER ────────────────────────────────────────────────────────
let player = null, currentKey = null, hideTimer = null;

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-player', {
    height:'1', width:'1',
    playerVars:{autoplay:1},
    events:{
      onStateChange(e){
        if (e.data === YT.PlayerState.ENDED) markDoneAndNext();
      }
    }
  });
};

const pd = document.createElement('div');
pd.id = 'yt-player';
pd.style.cssText = 'position:fixed;bottom:-10px;left:-10px;width:1px;height:1px;';
document.body.appendChild(pd);

// ── CONTROL ───────────────────────────────────────────────────────
onValue(controlRef, (snap) => {
  const data = snap.val();
  if (!data || !player) return;
  if (data.action === 'pause')  player.pauseVideo();
  if (data.action === 'play')   player.playVideo();
  if (data.action === 'skip')   markDoneAndNext();
  if (data.action === 'replay') player.seekTo(0);
});

// ── QUEUE ─────────────────────────────────────────────────────────
let queue = [];

onValue(queueRef, (snapshot) => {
  const data = snapshot.val();
  if (!data) { queue = []; updateUI(); return; }
  queue = Object.entries(data)
    .map(([k,v]) => ({...v, key:k}))
    .filter(v => v.status === 'approved' || v.status === 'playing')
    .sort((a,b) => a.ts - b.ts);
  updateUI();
  tryPlay();
});

function tryPlay() {
  if (!player?.loadVideoById) return;
  const playing = queue.find(t => t.status === 'playing');
  if (playing) {
    if (playing.key !== currentKey) {
      currentKey = playing.key;
      player.loadVideoById(playing.id);
    }
    return;
  }
  const next = queue.find(t => t.status === 'approved');
  if (next) {
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ref:dbRef, update}) => {
      update(dbRef(db, `users/${uid}/queue/${next.key}`), {status:'playing'});
    });
  }
}

function markDoneAndNext() {
  if (!currentKey) return;
  const keyToRemove = currentKey;
  currentKey = null;
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ref:dbRef, remove}) => {
    remove(dbRef(db, `users/${uid}/queue/${keyToRemove}`));
  });
}

function showWidget() {
  clearTimeout(hideTimer);
  const w = document.getElementById('widget');
  w.classList.remove('hidden');
  w.classList.add('visible');
}
function hideWidget() {
  hideTimer = setTimeout(() => {
    const w = document.getElementById('widget');
    w.classList.remove('visible');
    w.classList.add('hidden');
  }, 1500);
}

function updateUI() {
  const playing = queue.find(t => t.status === 'playing');
  const rest    = queue.filter(t => t.status === 'approved');
  const titleEl = document.getElementById('track-title');
  const fromEl  = document.getElementById('track-from');
  const qRow    = document.getElementById('queue-row');

  if (playing || rest.length > 0) {
    showWidget();
    if (playing) {
      currentPlaying = playing;
      titleEl.textContent = playing.title;
      fromEl.textContent  = S('from') + ' ' + playing.from;
      titleEl.className   = playing.title.length > 30 ? 'track-text' : 'track-text short';
    } else {
      currentPlaying = null;
      titleEl.textContent = '';
      fromEl.textContent  = '';
    }
  } else {
    currentPlaying = null;
    hideWidget();
    titleEl.textContent = '';
    fromEl.textContent  = '';
  }

  qRow.innerHTML = rest.length > 0
    ? rest.slice(0, 4).map(t => `<span class="q-pill">${t.title}</span>`).join('')
    : '';
}

setTimeout(tryPlay, 2000);
</script>
</body>
</html>
