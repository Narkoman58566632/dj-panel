<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamDJ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;padding:24px;position:relative;}
@keyframes glow{0%,100%{box-shadow:0 0 20px #6441a544;}50%{box-shadow:0 0 40px #6441a588;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card{background:#161616;border:1px solid #2a2a2a;border-radius:24px;padding:48px 36px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.5s ease;}
.logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center;}
.logo span{color:#6441a5;}
.tagline{font-size:13px;color:#555;margin-bottom:40px;text-align:center;}
.login-btn{width:100%;border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Unbounded',sans-serif;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;transition:all 0.2s;letter-spacing:0.01em;}
.btn-twitch{background:#6441a5;color:#fff;animation:glow 3s ease-in-out infinite;}
.btn-twitch:hover{background:#7b54c9;transform:translateY(-1px);}
.btn-google{background:#fff;color:#333;}
.btn-google:hover{background:#f0f0f0;transform:translateY(-1px);}
.btn-icon{width:22px;height:22px;flex-shrink:0;}
.divider{width:100%;display:flex;align-items:center;gap:12px;margin:8px 0 20px;}
.divider-line{flex:1;height:1px;background:#2a2a2a;}
.divider-text{font-size:11px;color:#444;}
.features{margin-top:32px;width:100%;display:flex;flex-direction:column;gap:10px;}
.feature{display:flex;align-items:center;gap:10px;font-size:12px;color:#555;}
.feature-icon{font-size:16px;}
.status-msg{font-size:12px;color:#e08080;margin-top:12px;text-align:center;min-height:18px;}

/* СТИЛІ ДЛЯ ПЕРЕМИКАЧА МОВ */
.lang-select-wrap {position:absolute;top:20px;right:20px;}
.lang-select {background:#161616;border:1px solid #2a2a2a;color:#fff;padding:6px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;outline:none;cursor:pointer;}
.lang-select:hover {border-color:#6441a5;}
</style>
</head>
<body>

<div class="lang-select-wrap">
  <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
    <option value="uk">UA</option>
    <option value="en">EN</option>
    <option value="ru">RU</option>
  </select>
</div>

<div class="card">
  <div class="logo">Stream<span>DJ</span></div>
  <div class="tagline" id="txt-tagline">Музика на стрімі через Twitch Channel Points</div>

  <button class="login-btn btn-twitch" onclick="loginTwitch()">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="white"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
    <span id="txt-login-twitch">Увійти через Twitch</span>
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text" id="txt-or">або</div>
    <div class="divider-line"></div>
  </div>

  <button class="login-btn btn-google" onclick="loginGoogle()">
    <svg class="btn-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="txt-login-google">Увійти через Google</span>
  </button>

  <div class="status-msg" id="status"></div>

  <div class="features">
    <div class="feature"><span class="feature-icon">🎵</span> <span id="txt-f1">Черга треків через Twitch Channel Points</span></div>
    <div class="feature"><span class="feature-icon">🎛</span> <span id="txt-f2">DJ панель з повним керуванням</span></div>
    <div class="feature"><span class="feature-icon">🎬</span> <span id="txt-f3">Кастомний віджет для OBS</span></div>
    <div class="feature"><span class="feature-icon">🎨</span> <span id="txt-f4">Налаштування вигляду</span></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD77vyKpxE-PDJhk4aS8N3_SBAIIwoXIKE",
  authDomain: "livemusicrequests-71c75.firebaseapp.com",
  databaseURL: "https://livemusicrequests-71c75-default-rtdb.firebaseio.com",
  projectId: "livemusicrequests-71c75",
  storageBucket: "livemusicrequests-71c75.firebasestorage.app",
  messagingSenderId: "841403842500",
  appId: "1:841403842500:web:4716afe909ddedec416e91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ЛОКАЛІЗАЦІЯ
const translations = {
  uk: {
    title: "StreamDJ — музика на стрімі",
    tagline: "Музика на стрімі через Twitch Channel Points",
    loginTwitch: "Увійти через Twitch",
    or: "або",
    loginGoogle: "Увійти через Google",
    f1: "Черга треків через Twitch Channel Points",
    f2: "DJ панель з повним керуванням",
    f3: "Кастомний віджет для OBS",
    f4: "Налаштування вигляду",
    connecting: "Підключення...",
    redirecting: "Перенаправлення на Twitch...",
    error: "Помилка: спробуй ще раз"
  },
  en: {
    title: "StreamDJ — Stream Music",
    tagline: "Stream music via Twitch Channel Points",
    loginTwitch: "Log in with Twitch",
    or: "or",
    loginGoogle: "Log in with Google",
    f1: "Track queue via Twitch Channel Points",
    f2: "DJ dashboard with full control",
    f3: "Custom widget for OBS",
    f4: "Appearance settings",
    connecting: "Connecting...",
    redirecting: "Redirecting to Twitch...",
    error: "Error: try again"
  },
  ru: {
    title: "StreamDJ — музыка на стриме",
    tagline: "Музыка на стриме через Twitch Channel Points",
    loginTwitch: "Войти через Twitch",
    or: "или",
    loginGoogle: "Войти через Google",
    f1: "Очередь треков через Twitch Channel Points",
    f2: "DJ панель с полным управлением",
    f3: "Кастомный виджет для OBS",
    f4: "Настройка внешнего вида",
    connecting: "Подключение...",
    redirecting: "Перенаправление на Twitch...",
    error: "Ошибка: попробуй еще раз"
  }
};

let currentLang = localStorage.getItem('streamdj_lang') || 'uk';

window.applyLanguage = function(lang) {
  currentLang = lang;
  localStorage.setItem('streamdj_lang', lang);
  document.getElementById('langSelect').value = lang;
  document.title = translations[lang].title;
  
  document.getElementById('txt-tagline').textContent = translations[lang].tagline;
  document.getElementById('txt-login-twitch').textContent = translations[lang].loginTwitch;
  document.getElementById('txt-or').textContent = translations[lang].or;
  document.getElementById('txt-login-google').textContent = translations[lang].loginGoogle;
  document.getElementById('txt-f1').textContent = translations[lang].f1;
  document.getElementById('txt-f2').textContent = translations[lang].f2;
  document.getElementById('txt-f3').textContent = translations[lang].f3;
  document.getElementById('txt-f4').textContent = translations[lang].f4;
}

window.changeLanguage = function(lang) {
  applyLanguage(lang);
}

// Ініціалізація мови при завантаженні
applyLanguage(currentLang);


onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = './panel.html';
});

window.loginGoogle = async function() {
  setStatus(translations[currentLang].connecting);
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) {
    setStatus(translations[currentLang].error);
  }
};

window.loginTwitch = async function() {
  setStatus(translations[currentLang].redirecting);
  const CLIENT_ID = 'bt9iq3fqob2gxmr1li2jecy6bm0ppf';
  const REDIRECT = window.location.origin + window.location.pathname.replace('index.html','') + 'panel.html';
  localStorage.setItem('auth_method', 'twitch');
  window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=channel:read:redemptions+user:read:email`;
};

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
