<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamDJ — OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Стили по умолчанию, которые будут динамически перезаписываться из localStorage */
:root {
  --w-bg: #140000;
  --w-border: #c0392b;
  --w-title: #ffffff;
  --w-from: #7a3535;
  --w-label: #ff6060;
  --w-pill: #c08080;
  --w-fontsize: 13px;
  --w-scroll-speed: 12s;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent; /* Полностью прозрачный фон для удобного захвата */
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  padding: 10px;
}

/* Контейнер виджета */
.widget-container {
  width: 460px;
  height: 100px;
  background: var(--w-bg);
  border: 2px solid var(--w-border);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  position: relative;
  transition: all 0.3s ease;
  opacity: 0; /* Изначально скрыт, появляется только если есть трек */
}

.widget-container.active {
  opacity: 1;
}

/* Обложка (превью YouTube-видео) */
.track-thumb {
  width: 76px;
  height: 76px;
  border-radius: 8px;
  background: #000;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
}

.track-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Блок с текстовой информацией */
.track-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Метка СЕЙЧАС ИГРАЕТ / ОЧЕРЕДЬ */
.status-wrapper {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.status-label {
  font-family: 'Unbounded', sans-serif;
  font-size: calc(var(--w-fontsize) - 4px);
  font-weight: 700;
  color: var(--w-label);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.queue-pill {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--w-pill);
  color: var(--w-pill);
  border-radius: 99px;
  font-size: calc(var(--w-fontsize) - 4px);
  padding: 1px 6px;
  font-family: 'Unbounded', sans-serif;
}

/* Бегущая строка для названия трека */
.marquee-container {
  overflow: hidden;
  position: relative;
  width: 100%;
  height: calc(var(--w-fontsize) + 6px);
}

.marquee-text {
  position: absolute;
  white-space: nowrap;
  font-size: var(--w-fontsize);
  font-weight: 500;
  color: var(--w-title);
  animation: marquee var(--w-scroll-speed) linear infinite;
  padding-right: 50px;
}

@keyframes marquee {
  0% { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-50%, 0, 0); }
}

/* Информация об авторе заказа */
.track-author {
  font-size: calc(var(--w-fontsize) - 2px);
  color: var(--w-from);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<div class="widget-container" id="widget">
  <div class="track-thumb">
    <img id="thumb-img" src="" alt="">
  </div>
  <div class="track-info">
    <div class="status-wrapper">
      <span class="status-label" id="status-text">ЗАРАЗ ГРАЄ</span>
      <span class="queue-pill" id="queue-count">далі: 0</span>
    </div>
    <div class="marquee-container">
      <div class="marquee-text" id="track-title">Завантаження...</div>
    </div>
    <div class="track-author" id="track-ordered-by">від: ...</div>
  </div>
</div>

<script>
const STORAGE_KEYS = {
  QUEUE: 'streamdj_local_queue',
  WIDGET_THEME: 'streamdj_local_widget_theme'
};

let currentTrackId = null;

// Функция для обновления визуальных стилей из localStorage
function updateWidgetTheme() {
  const saved = localStorage.getItem(STORAGE_KEYS.WIDGET_THEME);
  if (!saved) return;
  
  try {
    const t = JSON.parse(saved);
    const root = document.documentElement;
    
    if (t.bg) root.style.setProperty('--w-bg', t.bg);
    if (t.border) root.style.setProperty('--w-border', t.border);
    if (t.title) root.style.setProperty('--w-title', t.title);
    if (t.from) root.style.setProperty('--w-from', t.from);
    if (t.label) root.style.setProperty('--w-label', t.label);
    if (t.pill) root.style.setProperty('--w-pill', t.pill);
    if (t.fontsize) root.style.setProperty('--w-w-fontsize', t.fontsize + 'px');
    if (t.scroll) root.style.setProperty('--w-scroll-speed', t.scroll + 's');
  } catch (e) {
    console.error("Ошибка разбора темы виджета:", e);
  }
}

// Функция обновления контента треков
function updateWidgetContent() {
  const rawQueue = localStorage.getItem(STORAGE_KEYS.QUEUE);
  const widgetContainer = document.getElementById('widget');
  
  if (!rawQueue) {
    widgetContainer.classList.remove('active');
    return;
  }
  
  try {
    const queueData = JSON.parse(rawQueue);
    const allItems = Object.values(queueData);
    
    // Ищем трек со статусом 'playing'
    const playingTrack = allItems.find(item => item.status === 'playing');
    
    // Считаем сколько одобренных треков осталось в очереди после текущего
    const approvedCount = allItems.filter(item => item.status === 'approved').length;
    document.getElementById('queue-count').textContent = `далі: ${approvedCount}`;
    
    if (!playingTrack) {
      // Если прямо сейчас ничего не играет, виджет плавно скрывается
      widgetContainer.classList.remove('active');
      currentTrackId = null;
      return;
    }
    
    // Если трек изменился — обновляем интерфейс
    if (currentTrackId !== playingTrack.id) {
      currentTrackId = playingTrack.id;
      
      // Установка превью трека
      document.getElementById('thumb-img').src = `https://img.youtube.com/vi/${playingTrack.id}/mqdefault.jpg`;
      
      // Логика бесконечной бегущей строки (дублируем текст, чтобы не было пустот при прокрутке)
      const titleEl = document.getElementById('track-title');
      const fullTitle = playingTrack.title || 'Без назви';
      titleEl.textContent = fullTitle;
      
      // Проверяем длину строки: если она длинная, дублируем её для создания бесшовной анимации
      if (fullTitle.length > 25) {
        titleEl.innerHTML = `${escapeHtml(fullTitle)} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${escapeHtml(fullTitle)}`;
        titleEl.style.animationPlayState = 'running';
      } else {
        titleEl.style.animation = 'none'; // Если короткий, не крутим
        titleEl.style.position = 'relative';
      }
      
      // Кем заказан
      document.getElementById('track-ordered-by').textContent = `від: ${playingTrack.from || 'Глядача'}`;
      
      // Показываем виджет
      widgetContainer.classList.add('active');
    }
    
  } catch (e) {
    console.error("Ошибка обновления контента виджета:", e);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Запускаем постоянный мониторинг изменений localStorage (каждые 500мс)
// Это заменяет real-time сокеты Firebase для работы в рамках одного браузера
setInterval(() => {
  updateWidgetTheme();
  updateWidgetContent();
}, 500);

// Первичный запуск при открытии страницы
updateWidgetTheme();
updateWidgetContent();
</script>

</body>
</html>
