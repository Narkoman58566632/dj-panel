<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style id="dynamic-styles">
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;font-family:'Unbounded',sans-serif;padding:16px;overflow:hidden;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(6px);}}
.widget{
  background:rgba(20,0,0,0.85);border:1px solid #c0392b;border-radius:12px;
  padding:10px 16px;min-width:320px;max-width:480px;backdrop-filter:blur(4px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}
.widget.hidden{opacity:0;transform:translateY(8px);pointer-events:none;}
.widget.visible{opacity:1;transform:translateY(0);animation:fadeIn 0.5s ease;}
.top-row{display:flex;align-items:center;gap:10px;overflow:hidden;}
.now-label{font-size:9px;color:#ff6060;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;animation:pulse 1.5s ease-in-out infinite;}
.track-scroll{flex:1;overflow:hidden;position:relative;}
.track-text{font-size:13px;color:#fff;white-space:nowrap;display:inline-block;animation:scroll 12s linear infinite;}
.track-text.short{animation:none;}
.from-text{font-size:10px;color:#7a3535;margin-top:4px;}
.queue-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.q-pill{font-size:10px;color:#c08080;background:#2a0808;border:1px solid #3d1010;border-radius:99px;padding:2px 8px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>
<div class="widget hidden" id="widget">
  <div class="top-row">
    <span class="now-label" id="w-now-label">&#9835; grає</span>
    <div class="track-scroll"><span class="track-text short" id="track-title"></span></div>
  </div>
  <div class="from-text" id="track-from"></div>
  <div class="queue-row" id="queue-row"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD77vyKpxE-PDJhk4aS8N3_SBAIIwoXIKE",
  authDomain: "livemusicrequests-71c75.firebaseapp.com",
  databaseURL: "https://livemusicrequests-71c75-default-rtdb.firebaseio.com",
  projectId: "livemusicrequests-71c75",
  storageBucket: "livemusicrequests-71c75.firebasestorage.app",
  messagingSenderId: "841403842500",
  appId: "1:841403842500:web:4716afe909ddedec416e91"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Получаем UID из параметров URL (?u=UID_СТРИМЕРА)
const urlParams = new URLSearchParams(window.location.search);
const USER_UID = urlParams.get('u') || 'default';

// Формируем динамические пути к Firebase на основе UID
const queueRef = ref(db, USER_UID !== 'default' ? `users/${USER_UID}/queue` : 'queue');
const controlRef = ref(db, USER_UID !== 'default' ? `users/${USER_UID}/control` : 'control');
const themeRef = ref(db, `users/${USER_UID}/widget_theme`);

const widget = document.getElementById('widget');
let hideTimer = null;

function showWidget() {
  clearTimeout(hideTimer);
  widget.classList.remove('hidden');
  widget.classList.add('visible');
}

function hideWidget() {
  hideTimer = setTimeout(() => {
    widget.classList.remove('visible');
    widget.classList.add('hidden');
  }, 1500);
}

// Применение динамической темы из базы данных панели
onValue(themeRef, (snap) => {
  const t = snap.val();
  if (!t) return;
  
  const styleEl = document.getElementById('dynamic-styles');
  styleEl.innerHTML = `
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:transparent;font-family:'Unbounded',sans-serif;padding:16px;overflow:hidden;}
    @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(6px);}}
    .widget{
      background:${t.bg || 'rgba(20,0,0,0.85)'};
      border:1px solid ${t.border || '#c0392b'};
      border-radius:12px;
      padding:10px 16px;min-width:320px;max-width:480px;backdrop-filter:blur(4px);
      transition:opacity 0.5s ease, transform 0.5s ease;
    }
    .widget.hidden{opacity:0;transform:translateY(8px);pointer-events:none;}
    .widget.visible{opacity:1;transform:translateY(0);animation:fadeIn 0.5s ease;}
    .top-row{display:flex;align-items:center;gap:10px;overflow:hidden;}
    .now-label{font-size:9px;color:${t.label || '#ff6060'};text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;animation:pulse 1.5s ease-in-out infinite;}
    .track-scroll{flex:1;overflow:hidden;position:relative;}
    .track-text{font-size:${t.fontsize || 13}px;color:${t.title || '#fff'};white-space:nowrap;display:inline-block;animation:scroll ${t.scroll || 12}s linear infinite;}
    .track-text.short{animation:none;}
    .from-text{font-size:10px;color:${t.from || '#7a3535'};margin-top:4px;}
    .queue-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
    .q-pill{font-size:10px;color:${t.pill || '#c08080'};background:rgba(0,0,0,0.2);border:1px solid ${t.border || '#3d1010'};border-radius:99px;padding:2px 8px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  `;
});

onValue(controlRef, (snap) => {
  const data = snap.val();
  if (!data || !player) return;
  if (data.action === 'pause') player.pauseVideo();
  if (data.action === 'play') player.playVideo();
  if (data.action === 'skip') markDoneAndNext();
  if (data.action === 'replay') player.seekTo(0);
});

let player = null;
let ytReady = false;
let currentKey = null;

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  player = new YT.Player('yt-player', {
    height:'1', width:'1',
    playerVars:{autoplay:1},
    events:{
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) markDoneAndNext();
      }
    }
  });
};

const playerDiv = document.createElement('div');
playerDiv.id = 'yt-player';
playerDiv.style.cssText = 'position:fixed;bottom:-10px;left:-10px;width:1px;height:1px;';
document.body.appendChild(playerDiv);

let queue = [];

onValue(queueRef, (snapshot) => {
  const data = snapshot.val();
  if (!data) { queue = []; updateUI(); return; }
  queue = Object.entries(data)
    .map(([k,v]) => ({...v, key: k}))
    .filter(v => v.status === 'approved' || v.status === 'playing')
    .sort((a,b) => a.ts - b.ts);
  updateUI();
  tryPlay();
});

function tryPlay() {
  if (!ytReady || !player || !player.loadVideoById) return;
  const playing = queue.find(t => t.status === 'playing');
  if (playing) {
    if (playing.key !== currentKey) {
      currentKey = playing.key;
      player.loadVideoById(playing.id);
    }
    return;
  }
  const next = queue.find(t => t.status === 'approved');
  if (next) {
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ref: dbRef, update}) => {
      const targetPath = USER_UID !== 'default' ? `users/${USER_UID}/queue/${next.key}` : `queue/${next.key}`;
      update(dbRef(getDatabase(), targetPath), {status: 'playing'});
    });
  }
}

function markDoneAndNext() {
  const playing = queue.find(t => t.status === 'playing');
  if (!playing) return;
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ref: dbRef, remove}) => {
    const targetPath = USER_UID !== 'default' ? `users/${USER_UID}/queue/${playing.key}` : `queue/${playing.key}`;
    remove(dbRef(getDatabase(), targetPath));
    currentKey = null;
  });
}

function updateUI() {
  const playing = queue.find(t => t.status === 'playing');
  const rest = queue.filter(t => t.status === 'approved');
  const titleEl = document.getElementById('track-title');
  const fromEl = document.getElementById('track-from');
  const qRow = document.getElementById('queue-row');

  if (playing) {
    showWidget();
    titleEl.textContent = playing.title;
    fromEl.textContent = 'від ' + playing.from;
    titleEl.className = playing.title.length > 30 ? 'track-text' : 'track-text short';
  } else if (rest.length > 0) {
    showWidget();
    titleEl.textContent = '';
    fromEl.textContent = '';
    titleEl.className = 'track-text short';
  } else {
    hideWidget();
    titleEl.textContent = '';
    fromEl.textContent = '';
  }

  qRow.innerHTML = rest.length > 0
    ? rest.slice(0,4).map(t => `<span class="q-pill">${t.title}</span>`).join('')
    : '';
}

setTimeout(tryPlay, 2000);
</script>
</body>
</html>
