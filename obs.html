<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>StreamDJ — OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Inter:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  width: 480px;
  height: 120px;
}
.widget-container {
  width: 460px;
  height: 100px;
  margin: 10px;
  background: var(--w-bg, #140000);
  border: 2px solid var(--w-border, #c0392b);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s ease;
}
.widget-container.active {
  opacity: 1;
  transform: translateY(0);
}
.thumb {
  width: 76px;
  height: 76px;
  border-radius: 10px;
  background: #000;
  overflow: hidden;
  flex-shrink: 0;
}
.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.track-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.status-label {
  font-family: 'Unbounded', sans-serif;
  font-size: 10px;
  color: var(--w-label, #ff6060);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.marquee-box {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  position: relative;
}
.track-title {
  display: inline-block;
  font-size: var(--w-fontsize, 13px);
  font-weight: 700;
  color: var(--w-title, #ffffff);
}
.marquee-box.scroll .track-title {
  animation: marquee var(--w-scroll, 12s) linear infinite;
}
@keyframes marquee {
  0% { transform: translate3d(0, 0, 0); }
  10% { transform: translate3d(0, 0, 0); }
  90% { transform: translate3d(-50%, 0, 0); }
  100% { transform: translate3d(-50%, 0, 0); }
}
.track-author {
  font-size: calc(var(--w-fontsize, 13px) - 2px);
  color: var(--w-from, #7a3535);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.queue-pill {
  position: absolute;
  top: -10px;
  right: 15px;
  background: var(--w-border, #c0392b);
  color: var(--w-pill, #c08080);
  font-family: 'Unbounded', sans-serif;
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
  border: 2px solid var(--w-bg, #140000);
}
#player {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="player"></div>

<div class="widget-container" id="widget">
  <div class="queue-pill" id="q-count">ЧЕРГА: 0</div>
  <div class="thumb"><img id="t-img" src="" alt=""></div>
  <div class="track-info">
    <div class="status-label" id="t-status">ЗАРАЗ ГРАЄ</div>
    <div class="marquee-box" id="m-box">
      <span class="track-title" id="t-title">Завантаження...</span>
    </div>
    <div class="track-author" id="t-from">від стрімера</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD77vyKpxE-PDJhk4aS8N3_SBAIIwoXIKE",
  authDomain: "livemusicrequests-71c75.firebaseapp.com",
  databaseURL: "https://livemusicrequests-71c75-default-rtdb.firebaseio.com",
  projectId: "livemusicrequests-71c75",
  storageBucket: "livemusicrequests-71c75.firebasestorage.app",
  messagingSenderId: "841403842500",
  appId: "1:841403842500:web:4716afe909ddedec416e91"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Получаем UID стримера из URL (?u=UID)
const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get('u');

if (!uid) {
  document.getElementById('t-title').textContent = "Помилка: немає UID в лінку OBS";
} else {
  initWidget();
}

let player = null;
let currentTrack = null;
let approvedTracks = [];
let isPlayerReady = false;

// Загрузка API YouTube плеера
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('player', {
    height: '1',
    width: '1',
    videoId: '',
    playerVars: {
      'autoplay': 0,
      'controls': 0,
      'disablekb': 1,
      'fs': 0,
      'rel': 0,
      'modestbranding': 1
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
};

function onPlayerReady(event) {
  isPlayerReady = true;
  checkQueueLogic();
}

// Отслеживание состояния проигрывания в YouTube
function onPlayerStateChange(event) {
  // YT.PlayerState.ENDED = 0 (Трек завершился)
  if (event.data === YT.PlayerState.ENDED) {
    nextTrack();
  }
}

function initWidget() {
  // 1. Слушаем кастомную тему виджета из базы
  onValue(ref(db, `users/${uid}/widget_theme`), (snap) => {
    if (snap.exists()) {
      const t = snap.val();
      const root = document.documentElement;
      if(t.bg) root.style.setProperty('--w-bg', t.bg);
      if(t.border) root.style.setProperty('--w-border', t.border);
      if(t.title) root.style.setProperty('--w-title', t.title);
      if(t.from) root.style.setProperty('--w-from', t.from);
      if(t.label) root.style.setProperty('--w-label', t.label);
      if(t.pill) root.style.setProperty('--w-pill', t.pill);
      if(t.fontsize) root.style.setProperty('--w-fontsize', t.fontsize + 'px');
      if(t.scroll) root.style.setProperty('--w-scroll', t.scroll + 's');
    }
  });

  // 2. Слушаем очередь треков
  onValue(ref(db, `users/${uid}/queue`), (snap) => {
    const data = snap.val();
    if (!data) {
      approvedTracks = [];
      document.getElementById('q-count').textContent = "ЧЕРГА: 0";
      if (currentTrack) {
        stopAndHide();
      }
      return;
    }

    // Собираем только одобренные к проигрыванию треки
    const all = Object.entries(data).map(([k,v]) => ({...v, key:k})).sort((a,b) => a.ts - b.ts);
    approvedTracks = all.filter(t => t.status === 'approved' || t.status === 'playing');
    
    document.getElementById('q-count').textContent = `ЧЕРГА: ${approvedTracks.length}`;

    checkQueueLogic();
  });

  // 3. Слушаем кнопки управления из панели ("Пауза", "Пропустить", и т.д.)
  onValue(ref(db, `users/${uid}/control`), (snap) => {
    if (!snap.exists() || !player || !isPlayerReady) return;
    const ctrl = snap.val();
    
    // Проверяем, чтобы команда была свежей (не старой)
    if (Date.now() - ctrl.ts > 5000) return; 

    if (ctrl.action === 'pause') {
      player.pauseVideo();
    } else if (ctrl.action === 'play') {
      if (currentTrack) player.playVideo();
    } else if (ctrl.action === 'skip') {
      nextTrack();
    } else if (ctrl.action === 'replay') {
      if (currentTrack) player.seekTo(0);
    }
  });
}

// Основная логика выбора трека
function checkQueueLogic() {
  if (!isPlayerReady || approvedTracks.length === 0) return;

  // Ищем трек, который уже имеет статус 'playing'
  let playingNow = approvedTracks.find(t => t.status === 'playing');

  // Если такого нет, берем самый первый 'approved' трек и запускаем его
  if (!playingNow) {
    playingNow = approvedTracks[0];
    currentTrack = playingNow;
    
    // Сразу обновляем его статус в Firebase на 'playing', чтобы панель его увидела!
    update(ref(db, `users/${uid}/queue/${playingNow.key}`), { status: 'playing' });
    
    playTrack(playingNow);
  } else {
    // Если трек со статусом 'playing' сменился (например, первый удалили вручную)
    if (!currentTrack || currentTrack.key !== playingNow.key) {
      currentTrack = playingNow;
      playTrack(playingNow);
    }
  }
}

function playTrack(track) {
  if (!player || !isPlayerReady) return;
  
  player.loadVideoById(track.id);
  player.playVideo();

  // Визуальное оформление виджета
  document.getElementById('t-img').src = `https://img.youtube.com/vi/${track.id}/mqdefault.jpg`;
  
  const titleEl = document.getElementById('t-title');
  titleEl.textContent = track.title;
  document.getElementById('t-from').textContent = `від: ${track.from}`;
  
  document.getElementById('widget').classList.add('active');

  // Логика бегущей строки (marquee)
  const mBox = document.getElementById('m-box');
  mBox.classList.remove('scroll');
  
  setTimeout(() => {
    if (titleEl.offsetWidth > mBox.offsetWidth) {
      // Клонируем текст для бесшовного скролла
      titleEl.innerHTML = `${track.title} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${track.title} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`;
      mBox.classList.add('scroll');
    } else {
      titleEl.textContent = track.title;
    }
  }, 200);
}

function nextTrack() {
  if (currentTrack) {
    // Удаляем завершенный/пропущенный трек из Firebase
    remove(ref(db, `users/${uid}/queue/${currentTrack.key}`));
    currentTrack = null;
  }
}

function stopAndHide() {
  if (player && isPlayerReady) player.stopVideo();
  currentTrack = null;
  document.getElementById('widget').classList.remove('active');
}
</script>
</body>
</html>
